name: Free ephemeral n8n

on:
  workflow_dispatch:
    inputs:
      run_daily_scheduler:
        description: "Run the 9am scheduler workflow before polling"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      run_main_safety:
        description: "Run main workflow even if Telegram Poll did not trigger it"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      force_regen_slug:
        description: "Optional slug to regenerate even if its Sheet row is done"
        required: false
        default: ""
        type: string
      main_max_runs:
        description: "Max main workflow runs in this cycle"
        required: false
        default: "0"
        type: string
      generation_paused:
        description: "Temporarily skip Freshness, Scheduler, Poll and Main"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      schema_only:
        description: "Only ensure Google Sheets schema, then stop"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      run_candidate_backfill:
        description: "Backfill review_candidates from published data/*.json"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      run_candidate_cleanup:
        description: "Backup review_candidates, then discard bad pending candidates"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      restore_candidate_rows:
        description: "Comma-separated review_candidates rows to restore from cleanup"
        required: false
        default: ""
        type: string
concurrency:
  group: free-ephemeral-n8n
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RUN_DAILY_SCHEDULER: ${{ github.event_name == 'workflow_dispatch' && inputs.run_daily_scheduler == 'true' || github.event.schedule == '7 16 * * *' }}
      RUN_FRESHNESS: ${{ github.event_name == 'workflow_dispatch' && inputs.run_daily_scheduler == 'true' || github.event.schedule == '7 16 * * *' }}
      RUN_MAIN_SAFETY: ${{ github.event_name == 'workflow_dispatch' && inputs.run_main_safety == 'true' }}
      FORCE_REGEN_SLUG: ${{ github.event_name == 'workflow_dispatch' && inputs.force_regen_slug || '' }}
      MAIN_MAX_RUNS: ${{ github.event_name == 'workflow_dispatch' && inputs.main_max_runs || '0' }}
      GENERATION_PAUSED: ${{ github.event_name != 'workflow_dispatch' || inputs.generation_paused == 'true' }}
      SCHEMA_ONLY: ${{ github.event_name == 'workflow_dispatch' && inputs.schema_only == 'true' }}
      RUN_CANDIDATE_BACKFILL: ${{ github.event_name == 'workflow_dispatch' && inputs.run_candidate_backfill == 'true' }}
      RUN_CANDIDATE_CLEANUP: ${{ github.event_name == 'workflow_dispatch' && inputs.run_candidate_cleanup == 'true' }}
      RESTORE_CANDIDATE_ROWS: ${{ github.event_name == 'workflow_dispatch' && inputs.restore_candidate_rows || '' }}
      SEND_CYCLE_SUMMARY: ${{ github.event_name == 'workflow_dispatch' && inputs.run_daily_scheduler == 'true' || github.event.schedule == '7 16 * * *' }}
      N8N_ENCRYPTION_KEY: ${{ secrets.N8N_ENCRYPTION_KEY }}
      N8N_CREDENTIALS_JSON_B64: ${{ secrets.N8N_CREDENTIALS_JSON_B64 }}
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      ML_CLIENT_ID: ${{ secrets.ML_CLIENT_ID }}
      ML_CLIENT_SECRET: ${{ secrets.ML_CLIENT_SECRET }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      ABACUS_API_KEY: ${{ secrets.ABACUS_API_KEY }}
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install web dependencies
        run: npm ci

      - name: Prepare patched n8n workflows
        run: npm run n8n:prepare

      - name: Run n8n cycle
        run: npm run n8n:cycle
